services:
  lira:
    build:
      context: .
      dockerfile: Dockerfile
    image: lira:latest
    restart: unless-stopped
    environment:
      - PORT=${PORT:-5080}
    ports:
      - "${PORT:-5080}:${PORT:-5080}"
    volumes:
      - type: bind
        source: /data
        target: /data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:$${PORT:-5080}/healthz >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
